<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
    <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
    <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
    <script src="./external/scripts/aframe-extras-7.2.0.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script> -->
    <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam"></script>

    <script>
        AFRAME.registerComponent('tap-place', {
            init() {
                const ground = document.getElementById('ground')

                this.placed = false // ✅ flag to lock placement

                // Create model
                this.model = document.createElement('a-entity')

                this.model.setAttribute('gltf-model', '#treeModel')
                this.model.setAttribute('scale', '0.1 0.1 0.1')
                this.model.setAttribute('visible', 'false')

                this.el.sceneEl.appendChild(this.model)

                // Tap event
                ground.addEventListener('click', (event) => {

                    // ❌ Stop if already placed
                    if (this.placed) return

                    this.placed = true // ✅ lock

                    const touchPoint = event.detail.intersection.point

                    this.model.setAttribute('position', touchPoint)

                    const randomY = Math.random() * 360
                    this.model.setAttribute('rotation', `0 ${randomY} 0`)

                    this.model.setAttribute('visible', 'true')

                    // ✅ Start animation ONLY once
                    this.model.setAttribute('animation-mixer', {
                        clip: '*',
                        loop: 'once',
                        clampWhenFinished: true,
                    })

                    console.log('Model placed ✅ (locked)')
                })
            },
        })
    </script>
</head>

<body>
    <a-scene tap-place landing-page xrextras-loading xrextras-runtime-error xrextras-gesture-detector
        renderer="colorManagement:true" xrweb="
    allowedDevices: any;
    defaultEnvironmentFogIntensity: 0.5; 
    defaultEnvironmentFloorTexture: #grass;
    defaultEnvironmentFloorColor: #FFF;
    defaultEnvironmentSkyBottomColor: #B4C4CC; 
    defaultEnvironmentSkyTopColor: #5ac8fa;
    defaultEnvironmentSkyGradientStrength: 0.5;" raycaster="objects: .ground">

        <!-- Camera -->
        <a-camera position="0 1.6 0" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

        <!-- Assets -->
        <a-assets>
            <!-- 👉 Replace with your model -->
            <a-asset-item id="treeModel" src="exotic_darkv13.glb"></a-asset-item>
        </a-assets>

        <!-- Ground (tap surface) -->
        <a-plane id="ground" class="cantap" rotation="-90 0 0" width="100" height="100" color="#7BC8A4"
            visible="false"></a-plane>


    </a-scene>
</body>

</html>
