<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>A-Frame: Tap to Place Ground</title><meta itemprop="name" content="A-Frame: Tap to Place Ground"><meta name="twitter:title" content="A-Frame: Tap to Place Ground"><meta property="og:title" content="A-Frame: Tap to Place Ground"><meta property="og:site_name" content="A-Frame: Tap to Place Ground"><meta name="description" content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model."><meta itemprop="description" content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model."><meta property="og:description" content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model."><meta name="twitter:description" content="This example allows the user to grow cacti 🌵  by tapping or clicking the ground. Showcases raycasting, spawning objects, and importing a 3D model."><meta property="og:image" content="https://8thwall.org/aframe-world-effects/assets/preview.gif"/><script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script><script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script><script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script><script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" crossorigin="anonymous" async="true" data-preload-chunks="slam"></script></head><body><script src="bundle.js"></script><div class="over"><span id="promptText">Tap To Place Model</span></div><a-scene tap-place landing-page xrextras-loading xrextras-runtime-error renderer="colorManagement:true" xrweb="

      type: directional;
      intensity: 0.8;
      castShadow: true;

      shadowCameraLeft: -40;
